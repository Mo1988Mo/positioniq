name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fee tests
        run: node tests/fees.test.js
        
      - name: Run PnL tests
        run: node tests/pnl.test.js

      - name: Run R:R tests
        run: node tests/rr.test.js

      - name: Run risk tests
        run: node tests/risk.test.js

      - name: Run money tests
        run: node tests/money.test.js

      - name: Run break-even tests
        run: node tests/breakeven.test.js

      - name: Run legs tests
        run: node tests/legs.test.js
